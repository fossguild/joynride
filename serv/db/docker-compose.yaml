name: joynride_db

services:
  db:
    image: postgres:17.0-alpine3.20
    container_name: joynride_db
    restart: always
    environment:
      POSTGRES_DB: joynride
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234
    ports:
      - ${POSTGRES_EXPOSED_PORT:-5432}:5432
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - joynride_network

  migrate: &basemigrate
    profiles: ['tools']
    image: migrate/migrate
    entrypoint: 'migrate -database postgresql://admin:1234@db:5432/joynride?sslmode=disable -path /tmp/migrations'
    command: up
    depends_on:
      - db
    volumes:
      - ./migrations:/tmp/migrations
    networks:
      - joynride_network

  create-migration:
    <<: *basemigrate
    entrypoint: migrate create -dir /tmp/migrations -ext sql
    command: ''

volumes:
  pgdata:

networks:
  joynride_network:
    name: joynride_network
    external: true
